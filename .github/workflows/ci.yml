name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "TNS/**"
      - ".github/workflows/**"
  push:
    branches: ["main"]
    paths:
      - "TNS/**"
      - ".github/workflows/**"

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: TNS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: TNS/pnpm-lock.yaml

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Tests
        run: corepack pnpm test
