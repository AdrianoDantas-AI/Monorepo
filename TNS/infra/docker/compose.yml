name: tns-local

services:
  postgres-postgis:
    image: postgis/postgis:16-3.4
    container_name: tns-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tns}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tns}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      tns_net:
        aliases:
          - db
          - postgres

  redis:
    image: redis:7-alpine
    container_name: tns-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      tns_net:
        aliases:
          - redis

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: tns-api
    environment:
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres-postgis:5432/tns}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres-postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      tns_net:
        aliases:
          - api

  ingest:
    build:
      context: ../..
      dockerfile: services/ingest/Dockerfile
    container_name: tns-ingest
    environment:
      INGEST_PORT: ${INGEST_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres-postgis:5432/tns}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${INGEST_PORT:-3001}:3001"
    depends_on:
      postgres-postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      tns_net:
        aliases:
          - ingest

  realtime:
    build:
      context: ../..
      dockerfile: services/realtime/Dockerfile
    container_name: tns-realtime
    environment:
      REALTIME_PORT: ${REALTIME_PORT:-3002}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${REALTIME_PORT:-3002}:3002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      tns_net:
        aliases:
          - realtime

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    container_name: tns-worker
    environment:
      WORKER_PORT: ${WORKER_PORT:-3003}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres-postgis:5432/tns}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${WORKER_PORT:-3003}:3003"
    depends_on:
      postgres-postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:3003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      tns_net:
        aliases:
          - worker

volumes:
  postgres_data:

networks:
  tns_net:
    driver: bridge
