name: consoledegastos

services:
  postgres:
    image: postgres:16-alpine
    container_name: consoledegastos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consoledegastos
    ports:
      - "5432:5432"
    volumes:
      - consoledegastos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consoledegastos"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: consoledegastos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - consoledegastos_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

  api:
    build:
      context: ../..
      dockerfile: docker/node-workspace.Dockerfile
    container_name: consoledegastos-api
    restart: unless-stopped
    command: ["sh", "-lc", "pnpm --filter @consoledegastos/api dev"]
    environment:
      HOST: 0.0.0.0
      PORT: "4010"
      PERSISTENCE_MODE: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/consoledegastos
      REDIS_URL: redis://redis:6379
    ports:
      - "4010:4010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4010/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 8s

  web:
    build:
      context: ../..
      dockerfile: docker/node-workspace.Dockerfile
    container_name: consoledegastos-web
    restart: unless-stopped
    command: ["sh", "-lc", "pnpm --filter @consoledegastos/web dev"]
    environment:
      PORT: "4020"
      API_BASE_URL: http://api:4010
    ports:
      - "4020:4020"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4020/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 8s

  mobile-preview:
    build:
      context: ../..
      dockerfile: docker/node-workspace.Dockerfile
    container_name: consoledegastos-mobile-preview
    restart: unless-stopped
    command: ["sh", "-lc", "pnpm --filter @consoledegastos/mobile dev"]
    environment:
      PORT: "4030"
      API_BASE_URL: http://api:4010
    ports:
      - "4030:4030"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4030/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 8s

volumes:
  consoledegastos_postgres_data:
  consoledegastos_redis_data:
